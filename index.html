<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Oasis" />
    <meta name="description" content="Oasis Polirrubro — Tu comercio de confianza, ahora digital" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts: Orbitron + Exo 2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['Orbitron', 'monospace'],
              body: ['Exo 2', 'sans-serif'],
            },
          },
        },
      }
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Exo 2', sans-serif;
        background-color: #000000;
        color: #f0f0f0;
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* Circuit board background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(168, 85, 247, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(168, 85, 247, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      #root { position: relative; z-index: 1; min-height: 100vh; }

      /* Animations */
      @keyframes pulseNeon {
        0%, 100% { box-shadow: 0 0 15px #a855f7, 0 0 30px #7c3aed44; }
        50%       { box-shadow: 0 0 25px #a855f7, 0 0 50px #7c3aed77, 0 0 70px #7c3aed33; }
      }
      @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to   { transform: translateX(0);    opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-8px); }
      }

      /* Reusable classes */
      .neon-btn {
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        border-radius: 50px;
        box-shadow: 0 0 20px #a855f755, 0 4px 15px rgba(124,58,237,0.4);
        transition: all 0.2s ease;
        font-family: 'Exo 2', sans-serif;
        font-weight: 600;
        cursor: pointer;
        border: none;
        color: #fff;
      }
      .neon-btn:hover:not(:disabled) {
        box-shadow: 0 0 30px #a855f7, 0 6px 25px rgba(124,58,237,0.6);
        transform: translateY(-2px);
      }
      .neon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .card-neon {
        background: linear-gradient(135deg, #0f0f1a, #1a0a2e);
        border: 1px solid rgba(168,85,247,0.15);
        box-shadow: 0 4px 20px rgba(168,85,247,0.08);
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .card-neon:hover {
        border-color: rgba(168,85,247,0.4);
        box-shadow: 0 8px 30px rgba(168,85,247,0.15);
      }

      .animate-slide-in  { animation: slideIn 0.3s ease-out; }
      .animate-fade-in   { animation: fadeIn 0.4s ease-out; }
      .animate-float     { animation: float 3s ease-in-out infinite; }
      .animate-pulse-neon{ animation: pulseNeon 2s ease-in-out infinite; }

      /* Scrollbar */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Form inputs */
      input, textarea, select {
        background: #0a0a1a;
        border: 1px solid rgba(168,85,247,0.25);
        color: #f0f0f0;
        font-family: 'Exo 2', sans-serif;
        border-radius: 12px;
        padding: 10px 16px;
        width: 100%;
        font-size: 16px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      input:focus, textarea:focus, select:focus {
        border-color: #a855f7;
        box-shadow: 0 0 0 3px rgba(168,85,247,0.2);
        outline: none;
      }
      input::placeholder, textarea::placeholder { color: rgba(168,85,247,0.4); }
      select option { background: #0f0f1a; }
    </style>

    <title>Oasis Polirrubro</title>
  </head>
  <body>
    <noscript>Necesitás JavaScript para usar Oasis Polirrubro.</noscript>
    <div id="root"></div>
    <!-- Vite entry point -->
    <script type="module" src="main.jsx"></script>
  </body>
</html>
